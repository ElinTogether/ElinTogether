name: 功能建议
description: 为模组提议新功能或改进。
title: "[Request]: "
labels: [enhancement]
body:
  - type: markdown
    attributes:
      value: |
        **提交前请确认**
        - 请先检查该功能是否已被[提议过](https://github.com/gottyduke/test-issue-template/ssues?q=label%3Aenhancement)。

  - type: input
    id: game-version
    attributes:
      label: 游戏版本
      description: 你正在运行的游戏版本是什么？
      placeholder: 例如 Nightly 23.329 / Stable 23.325.2
    validations:
      required: true

  - type: input
    id: mod-version
    attributes:
      label: 模组版本
      description: 你正在运行的模组版本是什么？
      placeholder: 例如 0.21.0 / Steam 创意工坊最新版
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: 操作系统
      description: |
        你使用的是什么操作系统？
        如果不是 Windows，请详细说明你的运行环境（例如 Proton/SteamDeck、CrossOver、模拟器等）。
      value: Windows 11 23H2
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: 这个功能解决了什么问题？
      description: 清晰简洁地描述当前遇到的问题或需求。
      placeholder: 我经常对 [...] 感到困扰
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: 描述你期望的解决方案
      description: 你希望发生什么？它应该如何运作？
      placeholder: 我希望看到 [...]
    validations:
      required: true

  - type: dropdown
    id: priority
    attributes:
      label: 这个功能对你有多重要？
      options:
        - 至关重要 — 没有它无法正常游玩
        - 很重要 — 能显著改善体验
        - 还可以 — 实用但不急
    validations:
      required: true

  - type: dropdown
    id: workaround
    attributes:
      label: 是否存在替代方案？
      description: 能否通过现有功能或工具达到相同目的？
      options:
        - 没有替代方案
        - 有，但很麻烦
        - 有可接受的替代方案
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: 已考虑过的替代方案
      description: 描述你曾考虑过的任何方法或替代方案。

  - type: textarea
    id: additional
    attributes:
      label: 补充说明
      description: 在此添加任何其他信息、草图或参考资料。
