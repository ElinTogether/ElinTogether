name: Elin Together CI Deploy

on:
  push:
    branches: ["*"]
    paths: ["ElinTogether/**"]
  pull_request_target:
    paths: ["ElinTogether/**"]
  workflow_dispatch:

permissions:
  contents: write
  id-token: write
  pull-requests: write
  actions: read

jobs:
  security-check:
    name: Security Check
    if: github.event_name == 'pull_request_target'
    runs-on: ubuntu-latest
    outputs:
      should_build: ${{ steps.check.outputs.should_build }}
    steps:
      - name: Check PR Author & CSProj Changes
        id: check
        uses: actions/github-script@v9
        with:
          script: |
            const prNumber = context.payload.pull_request?.number;
            if (!prNumber) {
              core.setOutput('should_build', 'true');
              return;
            }

            const authorAssociation = context.payload.pull_request?.author_association || 'NONE';
            const trustedRoles = ['OWNER', 'MEMBER', 'COLLABORATOR'];
            const isTrusted = trustedRoles.includes(authorAssociation);

            const { data: files } = await github.rest.pulls.listFiles({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber,
              per_page: 100,
            });

            const csprojChanged = files.some(f => f.filename.endsWith('.csproj'));

            if (!isTrusted && csprojChanged) {
              core.warning(
                `Untrusted author ('${authorAssociation}') modified .csproj files. ` +
                `Build skipped for security reasons.`
              );
              core.setOutput('should_build', 'false');
              return;
            }

            core.setOutput('should_build', 'true');

  skip-comment:
    name: Post Security Skip Notice
    if: |
      github.event_name == 'pull_request_target' &&
      needs.security-check.result == 'success' &&
      needs.security-check.outputs.should_build == 'false'
    needs: security-check
    runs-on: ubuntu-latest
    steps:
      - name: Comment Security Warning
        uses: actions/github-script@v9
        with:
          script: |
            const prNumber = context.payload.pull_request.number;
            const marker = '<!-- ci-security-skip -->';
            const body = [
              marker,
              '## ⚠️ CI Build Blocked — Review Required',
              '',
              'This PR modifies **`.csproj`** file, the automated CI build will **not** execute.',
              '',
              '> A maintainer must review the changes and dispatch a manual build.',
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              per_page: 100,
            });

            const existing = comments.find(c => c.body?.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body,
              });
            }

  ci:
    needs: security-check
    if: |
      always() &&
      (github.event_name != 'pull_request_target' ||
       needs.security-check.outputs.should_build == 'true')
    uses: ./.github/workflows/build_plugin_ci.yml
    secrets: inherit
    with:
      plugin_name: ElinTogether
      plugin_path: ElinTogether
      tag_prefix: EMP
      release_name_prefix: "Elin Together - Preview"
      artifact_name_prefix: emp
      prerelease: true