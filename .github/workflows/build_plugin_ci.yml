name: Elin Plugin CI Deploy

on:
  workflow_call:
    inputs:
      plugin_name:
        required: true
        type: string
      plugin_path:
        required: true
        type: string
      tag_prefix:
        required: true
        type: string
      release_name_prefix:
        required: true
        type: string
      prerelease:
        required: false
        type: boolean
        default: false
      artifact_name_prefix:
        required: true
        type: string

permissions:
  contents: write
  id-token: write
  pull-requests: write
  actions: read

jobs:
  build-and-upload:
    name: Build
    runs-on: windows-latest

    strategy:
      fail-fast: false
      matrix:
        version: [nightly, stable]
        configuration: [Debug, Release]

    steps:
      - name: Checkout Code
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          sparse-checkout: |
            ${{ inputs.plugin_name }}/
            assets/
            package/
            Directory.Build.props
            global.json
          sparse-checkout-cone-mode: false

      - name: Checkout Deps
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          path: ${{ matrix.version }}
          ref: ${{ matrix.version }}
          repository: gottyduke/Elin.Plugins.BuildDeps
          ssh-key: ${{ secrets.DEPS_DEPLOY_KEY }}

      - name: Setup Deps Tag
        id: deps
        shell: pwsh
        run: |
          pushd ${{ github.workspace }}\${{ matrix.version }}
          $tag = git describe --tags --abbrev=0 ${{ matrix.version }}
          popd
          echo "tag=$tag" >> $env:GITHUB_OUTPUT

      - name: Setup DotNet
        uses: actions/setup-dotnet@v6
        with:
          global-json-file: ${{ github.workspace }}\global.json
          cache: true
          cache-dependency-path: |
            ${{ github.workspace }}\${{ inputs.plugin_path }}\packages.lock.json

      - name: Setup Packages
        run: |
          dotnet restore ${{ github.workspace }}\${{ inputs.plugin_path }}\ --locked-mode

      - name: Build
        id: build
        env:
          ElinGamePath: ${{ github.workspace }}\${{ matrix.version }}
        shell: pwsh
        run: |
          $cfgBase = '${{ matrix.configuration }}'
          $config = if ('${{ matrix.version }}' -eq 'nightly') { "${cfgBase}Nightly" } else { $cfgBase }

          $outDir = "${{ github.workspace }}\out\${{ matrix.version }}-${{ matrix.configuration }}"
          dotnet build ${{ github.workspace }}\${{ inputs.plugin_path }}\${{ inputs.plugin_name }}.csproj -o $outDir -c $config --no-restore

          $dllPath = Join-Path -Path $outDir -ChildPath "${{ inputs.plugin_name }}.dll"
          $fileVersion = (Get-Item -Path $dllPath).VersionInfo.FileVersion
          $fileVersionShort = $fileVersion.Split('.')[0..2] -join '.'
          $debugSuffix = if ('${{ matrix.configuration }}' -eq 'Debug') { 'debug' } else { 'release' }

          echo "file_version=$fileVersion" >> $env:GITHUB_OUTPUT
          echo "file_version_short=$fileVersionShort" >> $env:GITHUB_OUTPUT
          echo "file_name=${{ inputs.artifact_name_prefix }}-ci-builds-$fileVersion-${{ steps.deps.outputs.tag }}-$debugSuffix" >> $env:GITHUB_OUTPUT
          echo "out_dir=$outDir" >> $env:GITHUB_OUTPUT
          echo "debug_suffix=$debugSuffix" >> $env:GITHUB_OUTPUT

      - name: Upload Artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ steps.build.outputs.file_name }}
          path: ${{ steps.build.outputs.out_dir }}

      - name: Prepare Release
        if: github.event_name != 'pull_request' && github.event_name != 'pull_request_target'
        id: artifact
        shell: pwsh
        run: |
          $source = "${{ steps.build.outputs.out_dir }}"
          $debugSuffix = "${{ steps.build.outputs.debug_suffix }}"
          $destination = "${{ steps.build.outputs.out_dir }}\${{ inputs.artifact_name_prefix }}-ci-builds-${{ steps.deps.outputs.tag }}-$debugSuffix.zip"

          Compress-Archive -Path "$source\*" -DestinationPath $destination -Force
          $path = $destination -Replace '\\', '/'

          $tag = "${{ inputs.tag_prefix }}-${{ steps.build.outputs.file_version_short }}"

          gh api repos/${{ github.repository }}/git/refs/tags/$tag -q "if .object then true else false" 2>$null
          if ($LASTEXITCODE -eq 0) { gh api -X DELETE repos/${{ github.repository }}/git/refs/tags/$tag }
          if (git tag -l $tag) { git tag -d $tag }

          $lastTag = git describe --tags --abbrev=0 --match="${{ inputs.tag_prefix }}-*"
          $lastTagSha = git rev-parse $lastTag
          $commits = @(git log "$($lastTag)..HEAD" --date=format:"%y-%m-%d %H:%M" --pretty=format:"- %cd %h %s @%an" |
            ? { $_ -notmatch "cleanup|Merge branch" })

          $changelog = @(
            "Last Tag ($lastTag): $lastTagSha"
            ""
          )
          $changelog += $commits

          $changelog | Set-Content -Path "${{ github.workspace }}\CHANGELOG.txt" -Encoding utf8
          echo "artifact_path=$path" >> $env:GITHUB_OUTPUT

      - name: Create or Update Release
        if: github.event_name != 'pull_request' && github.event_name != 'pull_request_target'
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ inputs.tag_prefix }}-${{ steps.build.outputs.file_version_short }}
          name: ${{ inputs.release_name_prefix }} ${{ steps.build.outputs.file_version }}
          draft: false
          prerelease: ${{ inputs.prerelease }}
          generate_release_notes: false
          body_path: ${{ github.workspace }}\CHANGELOG.txt
          files: ${{ steps.artifact.outputs.artifact_path }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  pr-comment:
    name: PR Comment
    if: |
      !cancelled() &&
      (github.event_name == 'pull_request' || github.event_name == 'pull_request_target')
    needs: build-and-upload
    runs-on: ubuntu-latest
    steps:
      - name: Update PR Comment
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = context.payload.pull_request?.number;
            if (!prNumber) {
              core.warning('No PR number found in event payload, skipping comment.');
              return;
            }

            const buildResult = '${{ needs.build-and-upload.result }}';
            const buildSucceeded = buildResult === 'success';
            const statusIcon = buildSucceeded ? '✅' : '❌';
            const statusText = buildSucceeded ? 'Succeeded' : 'Failed';

            let artifactRows = '';
            try {
              const { data: artifacts } = await github.rest.actions.listWorkflowRunArtifacts({
                owner: context.repo.owner,
                repo: context.repo.repo,
                run_id: context.runId,
              });

              if (artifacts.artifacts.length > 0) {
                const lines = artifacts.artifacts.map(a => {
                  const sizeMb = (a.size_in_bytes / (1024 * 1024)).toFixed(1);
                  const url = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}/artifacts/${a.id}`;
                  // Expire info
                  const expireDate = new Date(a.expires_at);
                  const now = new Date();
                  const daysLeft = Math.max(0, Math.ceil((expireDate - now) / (1000 * 60 * 60 * 24)));
                  return `| \`${a.name}\` | ${sizeMb} MB | ${daysLeft}d | [Download](${url}) |`;
                });
                artifactRows = [
                  '| Artifact | Size | Expires | Link |',
                  '|---|---|---|---|',
                  ...lines,
                ].join('\n');
              } else {
                artifactRows = '_No artifacts were produced._';
              }
            } catch (err) {
              core.warning(`Failed to list artifacts: ${err.message}`);
              artifactRows = '_Unable to fetch artifact list._';
            }

            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const commitSha = context.sha.substring(0, 7);
            const commitUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/commit/${context.sha}`;
            const branchName = context.payload.pull_request?.head?.ref || context.ref.replace('refs/heads/', '');

            const body = [
              '<!-- ci-build-comment -->',
              `## ${statusIcon} CI Build — ${statusText}`,
              '',
              '| | |',
              '|---|---|',
              `| **Workflow** | [${context.workflow}](${runUrl}) |`,
              `| **Commit** | [\`${commitSha}\`](${commitUrl}) |`,
              `| **Branch** | \`${branchName}\` |`,
              `| **Trigger** | \`${context.eventName}\` |`,
              '',
              '### 📦 Artifacts',
              '',
              artifactRows,
            ].join('\n');

            const marker = '<!-- ci-build-comment -->';
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              per_page: 100,
            });

            const existing = comments.find(c => c.body?.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
              core.info(`Updated existing comment #${existing.id}`);
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body,
              });
              core.info('Created new PR comment');
            }
